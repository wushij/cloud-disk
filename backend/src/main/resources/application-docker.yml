# Docker Compose 依赖栈：MySQL 映射宿主机 3307；默认仍用内存缓存（clouddisk.redis.enabled=false）
spring:
  config:
    activate:
      on-profile: docker
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - cn.dev33.satoken.dao.SaTokenDaoRedisJackson
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/cloud_disk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password:
      database: 0

clouddisk:
  redis:
    enabled: false
  storage:
    type: minio
  minio:
    endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: cloud-disk
  ffmpeg:
    enabled: true
    path: ffmpeg
