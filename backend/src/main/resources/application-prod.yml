# 生产/服务器环境
server:
  port: ${SERVER_PORT:8055}

spring:
  config:
    activate:
      on-profile: prod
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRestClientAutoConfiguration
  datasource:
    url: jdbc:mysql://${CLOUDDISK_DB_HOST:127.0.0.1}:${CLOUDDISK_DB_PORT:3306}/cloud_disk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${CLOUDDISK_DB_USER:cloud_disk}
    password: ${CLOUDDISK_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${CLOUDDISK_REDIS_HOST:127.0.0.1}
      port: ${CLOUDDISK_REDIS_PORT:6379}
      password: ${CLOUDDISK_REDIS_PASSWORD:root}
      database: 0

clouddisk:
  redis:
    enabled: true
  rate-limit:
    api-per-minute: 1200
  storage:
    type: local
    local-root: ${CLOUDDISK_STORAGE:C:/clouddisk-data}
  onlyoffice:
    callback-base-url: ${CLOUDDISK_CALLBACK_BASE_URL:https://disk.wushij.online}
  cors:
    allowed-origin-patterns:
      - https://disk.wushij.online
      - http://disk.wushij.online
  upload:
    allowed-extensions: "jpg,jpeg,png,gif,bmp,pdf,doc,docx,xls,xlsx,ppt,pptx,txt,md,zip,rar,7z,mp3,mp4,avi,mov"

sa-token:
  alone-redis:
    database: 1
    timeout: 86400
  cookie:
    secure: true

knife4j:
  enable: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
