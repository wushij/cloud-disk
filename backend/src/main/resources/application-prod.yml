# 生产/服务器环境
spring:
  config:
    activate:
      on-profile: prod
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRestClientAutoConfiguration
  datasource:
    url: jdbc:mysql://${CLOUDDISK_DB_HOST:127.0.0.1}:${CLOUDDISK_DB_PORT:3306}/cloud_disk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${CLOUDDISK_REDIS_HOST:127.0.0.1}
      port: ${CLOUDDISK_REDIS_PORT:6379}
      password: ${CLOUDDISK_REDIS_PASSWORD:root}
      database: 0

clouddisk:
  redis:
    enabled: true
  storage:
    type: minio
  minio:
    endpoint: ${CLOUDDISK_MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${CLOUDDISK_MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${CLOUDDISK_MINIO_SECRET_KEY:minioadmin}
    bucket: ${CLOUDDISK_MINIO_BUCKET:cloud-disk}
  onlyoffice:
    callback-base-url: ${CLOUDDISK_CALLBACK_BASE_URL:http://127.0.0.1:8088}
  cors:
    allowed-origin-patterns:
      - ${CLOUDDISK_CORS_ORIGIN:https://disk.example.com}

sa-token:
  alone-redis:
    database: 1
    timeout: 86400
