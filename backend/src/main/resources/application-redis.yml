spring:
  config:
    activate:
      on-profile: redis
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchRestClientAutoConfiguration

sa-token:
  alone-redis:
    database: 1
    timeout: 86400

clouddisk:
  redis:
    enabled: true
