# 本地开发：MySQL 3306 + 本机 Redis 6379（无密码）+ 本地磁盘存储
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://${CLOUDDISK_DB_HOST:127.0.0.1}:${CLOUDDISK_DB_PORT:3306}/cloud_disk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${CLOUDDISK_DB_USER:root}
    password: ${CLOUDDISK_DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${CLOUDDISK_REDIS_HOST:127.0.0.1}
      port: ${CLOUDDISK_REDIS_PORT:6379}
      password: ${CLOUDDISK_REDIS_PASSWORD:}
      database: 0

clouddisk:
  redis:
    enabled: true
  rate-limit:
    enabled: false
  sentinel:
    enabled: false
  storage:
    type: local
    # 工作目录为 backend/ 时，../datas = 项目根目录/datas
    local-root: ${CLOUDDISK_STORAGE:../datas}
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - http://192.168.*:*
      - http://10.*:*
      - http://172.*:*
  ffmpeg:
    enabled: true
    path: ffmpeg

sa-token:
  alone-redis:
    database: 1
    timeout: 86400
