server:
  port: ${SERVER_PORT:8055}
  shutdown: graceful

spring:
  application:
    name: clouddisk-pro
  profiles:
    default: prod
    group:
      local:
        - dev
  lifecycle:
    timeout-per-shutdown-phase: 30s
  web:
    locale: zh_CN
    locale-resolver: fixed
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ElasticsearchRestClientAutoConfiguration
      - org.springframework.boot.autoconfigure.elasticsearch.ReactiveElasticsearchClientAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ElasticsearchDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.elasticsearch.ReactiveElasticsearchRepositoriesAutoConfiguration
  rabbitmq:
    host: 127.0.0.1
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5
  servlet:
    multipart:
      max-file-size: 128MB
      max-request-size: 128MB
  datasource:
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 10000
      max-lifetime: 1800000
      pool-name: clouddisk-hikari
      leak-detection-threshold: 60000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  is-read-header: true
  is-read-cookie: true
  is-write-cookie: true

xxl:
  job:
    enabled: false
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin
    accessToken: default_token
    executor:
      appname: clouddisk-pro
      address:
      ip:
      port: 9999
      logpath: ./logs/xxl-job
      logretentiondays: 30

clouddisk:
  redis:
    enabled: false
  storage:
    type: local
    local-root: ${CLOUDDISK_STORAGE:../datas}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://127.0.0.1:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:cloud-disk}
  chunk:
    default-size: 8388608
    max-size: 67108864
    max-chunks: 5000
    session-expire-hours: 24
  upload:
    max-file-size: 21474836480
    allowed-extensions: "*"
    blocked-extensions: exe,bat,cmd,com,scr,vbs,msi,dll,apk,jar,ps1,msh,reg,cpl,hta,inf
  onlyoffice:
    enabled: ${ONLYOFFICE_ENABLED:false}
    document-server-url: ${ONLYOFFICE_DOC_SERVER_URL:http://127.0.0.1:8082}
    jwt-secret: ${ONLYOFFICE_JWT_SECRET:clouddisk-onlyoffice-jwt-secret-change-me}
    callback-base-url: ${ONLYOFFICE_CALLBACK_URL:http://127.0.0.1:8055}
    edit-mode: ${ONLYOFFICE_EDIT_MODE:edit}
  schedule:
    enabled: true
    recycle-retain-days: 30
  rate-limit:
    upload-per-minute: 60
    login-per-minute: 20
    register-per-minute: 10
    share-per-minute: 120
    api-per-minute: 300
    share-extract-max-attempts: 5
    login-fail-max: 5
    login-lock-minutes: 15
    ip-ban-threshold: 30
    ip-ban-minutes: 60
    captcha-after-failures: 3
    captcha-on-register: true
  sentinel:
    enabled: true
    dashboard: 127.0.0.1:8858
    upload-qps: 30
    login-qps: 10
    register-qps: 5
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
  rabbitmq:
    enabled: false
  elasticsearch:
    enabled: false
    index-name: cloud_disk_file
  ffmpeg:
    enabled: true
    path: ffmpeg
    screenshot-time: "00:00:01"
    video-codec: libx264
    audio-codec: aac
    transcode-suffix: _720p.mp4
  ldap:
    enabled: ${LDAP_ENABLED:false}
    urls: ${LDAP_URLS:ldap://127.0.0.1:389}
    base: ${LDAP_BASE:dc=example,dc=com}
    user-dn: ${LDAP_USER_DN:cn=admin,dc=example,dc=com}
    password: ${LDAP_PASSWORD:}
  sso:
    enabled: false
  monitoring:
    admin-client-enabled: false
    admin-server-url: http://127.0.0.1:8090
  cdn:
    enabled: false
    domain: ""
  virus-scan:
    enabled: false
    host: 127.0.0.1
    port: 3310
    timeout-ms: 30000
    max-bytes: 104857600

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

spring.boot.admin.client:
  enabled: ${clouddisk.monitoring.admin-client-enabled:false}
  url: ${clouddisk.monitoring.admin-server-url:http://127.0.0.1:8090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    env:
      enabled: false
    loggers:
      enabled: false
    health:
      show-details: when_authorized
      probes:
        enabled: true
  health:
    ldap:
      enabled: ${clouddisk.ldap.enabled:false}
    elasticsearch:
      enabled: ${clouddisk.elasticsearch.enabled:false}
    rabbit:
      enabled: ${clouddisk.rabbitmq.enabled:false}
