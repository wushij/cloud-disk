# CloudDisk Pro 本地开发依赖栈（仅基础设施，不含后端/前端）
#
# 仅依赖（本机跑前后端）:
#   docker compose -f docker/docker-compose.yml up -d
#   SPRING_PROFILES_ACTIVE=docker mvn spring-boot:run -DskipTests   # backend/
#   npm run dev                                                        # frontend/
#
# 全栈（Nginx + 后端 + Admin 监控，需先 build 前端与 JAR）:
#   cd frontend && npm run build
#   cd mobile && npm run build:h5
#   cd backend && mvn package -DskipTests
#   cd monitoring/admin-server && mvn package -DskipTests
#   docker compose --env-file docker/.env -f docker/docker-compose.yml --profile app up -d --build
#   浏览器: http://localhost:8080（PC / 移动端同域）
#   监控:   http://localhost:8090
#
# 停止:  docker compose -f docker/docker-compose.yml --profile app down
# 日志:  docker compose -f docker/docker-compose.yml logs -f
#
# MySQL 映射宿主机 3307，避免与本机 3306 冲突。
# 首次启动会自动执行 ../sql/init.sql 初始化 cloud_disk 库。

services:
  mysql:
    image: mysql:8.0
    container_name: clouddisk-mysql
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cloud_disk
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clouddisk-redis
    environment:
      TZ: Asia/Shanghai
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: clouddisk-minio
    environment:
      TZ: Asia/Shanghai
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: clouddisk-rabbitmq
    environment:
      TZ: Asia/Shanghai
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: wu17/disk:elasticsearch-8.12.2-ik-pinyin
    container_name: clouddisk-es
    environment:
      TZ: Asia/Shanghai
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 60s
    restart: unless-stopped

  admin-server:
    profiles: [app]
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin-server
    image: wu17/disk:admin-server-latest
    container_name: clouddisk-admin-server
    environment:
      TZ: Asia/Shanghai
    ports:
      - "8090:8090"
    restart: unless-stopped

  backend:
    profiles: [app]
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      args:
        HTTP_PROXY: ${HTTP_PROXY:-http://host.docker.internal:7897}
        HTTPS_PROXY: ${HTTPS_PROXY:-http://host.docker.internal:7897}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    image: wu17/disk:backend-latest
    container_name: clouddisk-backend
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker,onlyoffice
      CLOUDDISK_DB_HOST: mysql
      CLOUDDISK_DB_PORT: "3306"
      CLOUDDISK_REDIS_HOST: redis
      CLOUDDISK_REDIS_PORT: "6379"
      CLOUDDISK_MINIO_ENDPOINT: http://minio:9000
      CLOUDDISK_ONLYOFFICE_CALLBACK_BASE_URL: http://backend:8055
      CLOUDDISK_ONLYOFFICE_INTERNAL_DOCUMENT_SERVER_URL: http://onlyoffice
      CLOUDDISK_RABBITMQ_HOST: rabbitmq
      CLOUDDISK_ES_URIS: http://elasticsearch:9200
      CLOUDDISK_MONITORING_ADMIN_SERVER_URL: http://admin-server:8090
      CLOUDDISK_ADMIN_SERVICE_BASE_URL: http://backend:8055
      CLOUDDISK_ADMIN_MANAGEMENT_URL: http://backend:8055/actuator
    ports:
      - "8055:8055"
    depends_on:
      admin-server:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started
      onlyoffice:
        condition: service_started
    restart: unless-stopped

  onlyoffice:
    profiles: [app]
    image: onlyoffice/documentserver
    container_name: clouddisk-onlyoffice
    ports:
      - "8082:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=clouddisk-onlyoffice-jwt-secret-change-me
    restart: unless-stopped

  nginx:
    profiles: [app]
    image: nginx:alpine
    container_name: clouddisk-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html/pc:ro
      - ../mobile/dist/build/h5:/usr/share/nginx/html/mobile:ro
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  es_data:
