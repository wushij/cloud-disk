# Docker 全栈：同一域名，Nginx 按 User-Agent 分发 PC / 移动端 H5
# 手机 UA → mobile/index.html + mobile/assets/*
# 桌面 UA → pc/index.html + pc/assets/*
# 注意：不要用嵌套 location，否则 /assets 会 404

map $request_uri $request_uri_masked {
    default $request_uri;
    ~*(?i)(.*access_token=)[^&]*(.*) $1******$2;
    ~*(?i)(.*token=)[^&]*(.*) $1******$2;
}

log_format masked '$remote_addr - $remote_user [$time_local] '
                  '"$request_method $request_uri_masked $server_protocol" '
                  '$status $body_bytes_sent "$http_referrer" '
                  '"$http_user_agent"';

limit_req_zone $binary_remote_addr zone=cd_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=cd_login:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=cd_conn:10m;

upstream clouddisk_backend {
    server backend:8055;
    keepalive 32;
}

upstream clouddisk_minio {
    server minio:9000;
    keepalive 8;
}

map $http_user_agent $frontend_root {
    default /usr/share/nginx/html/pc;
    "~*(Android|iPhone|iPod|Mobile|webOS|BlackBerry|IEMobile|Opera Mini)" /usr/share/nginx/html/mobile;
}

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types text/plain text/css text/javascript application/json application/javascript application/xml image/svg+xml font/woff2;

server {
    listen 80;
    server_name localhost;

    client_max_body_size 20g;
    client_body_timeout 120s;
    send_timeout 120s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 30s;
    server_tokens off;
    limit_conn cd_conn 50;

    access_log /var/log/nginx/access.log masked;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Vary Accept always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Content-Security-Policy "upgrade-insecure-requests" always;

    # 针对静态资源路径（兼容子路径下的相对引用如 /admin/assets/*）
    location ~* ^/(.+)/assets/(.*)$ {
        rewrite ^/(.+)/assets/(.*)$ /assets/$2 last;
    }

    location / {
        root $frontend_root;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 针对 .mjs 文件特殊处理 MIME 类型，防止被解析为 application/octet-stream
    location ~ \.mjs$ {
        root $frontend_root;
        types {
            application/javascript mjs;
        }
    }

    location /api/auth/login {
        limit_req zone=cd_login burst=10 nodelay;
        proxy_pass http://clouddisk_backend/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=cd_login burst=5 nodelay;
        proxy_pass http://clouddisk_backend/api/auth/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=cd_api burst=60 nodelay;
        proxy_pass http://clouddisk_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20g;
        add_header Cache-Control "no-store";
    }

    location /ws/ {
        proxy_pass http://clouddisk_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location /share/ {
        if ($http_accept ~* "html") {
            rewrite ^/share/[a-zA-Z0-9]+/?$ /index.html last;
        }
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        limit_req zone=cd_api burst=30 nodelay;
        proxy_pass http://clouddisk_backend/share/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /minio-cdn/ {
        proxy_pass http://clouddisk_minio/;
        proxy_set_header Host $host;
        proxy_buffering off;
        client_max_body_size 20g;
    }

    location /swagger-ui/ {
        proxy_pass http://clouddisk_backend/swagger-ui/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v3/api-docs {
        proxy_pass http://clouddisk_backend/v3/api-docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
