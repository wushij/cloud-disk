# CloudDisk Pro Nginx 生产部署配置
# 含安全 header、gzip 压缩、限流防护、UA 自动分流、静态资源缓存

# ==================== http 块 ====================

# 限流 zone 定义
limit_req_zone $binary_remote_addr zone=cd_api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=cd_login:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=cd_conn:10m;

# 上游后端
upstream clouddisk_backend {
    server 127.0.0.1:8088;
    keepalive 32;
}

# gzip 压缩
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

server {
    listen 443 ssl http2;
    server_name disk.example.com;

    # ==================== SSL 配置 ====================
    # ssl_certificate     /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ==================== 安全 Header ====================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # HSTS（首次部署后取消注释）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ==================== 基础配置 ====================
    client_max_body_size 20g;
    client_body_timeout 120s;
    client_header_timeout 30s;
    send_timeout 120s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_connect_timeout 30s;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 单 IP 最大并发连接
    limit_conn cd_conn 50;

    # ==================== 前端静态资源（UA 自动识别终端） ====================
    # PC 访问 → pc/index.html
    # 手机访问 → mobile/index.html
    location / {
        set $frontend_root /usr/share/nginx/html/pc;

        if ($http_user_agent ~* "(Android|iPhone|iPod|Mobile|webOS|BlackBerry|IEMobile|Opera Mini)") {
            set $frontend_root /usr/share/nginx/html/mobile;
        }

        root $frontend_root;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源长缓存（Vite 构建带 hash）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # index.html 不缓存（确保更新即时生效）
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
        }
    }

    # ==================== 登录/注册限流 ====================
    location /api/auth/login {
        limit_req zone=cd_login burst=10 nodelay;
        proxy_pass http://clouddisk_backend/api/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/register {
        limit_req zone=cd_login burst=5 nodelay;
        proxy_pass http://clouddisk_backend/api/auth/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==================== API 代理 ====================
    location /api/ {
        limit_req zone=cd_api burst=60 nodelay;
        proxy_pass http://clouddisk_backend/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20g;
        add_header Cache-Control "no-store";
    }

    # ==================== WebSocket ====================
    location /ws/ {
        proxy_pass http://clouddisk_backend/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
    }

    # ==================== 分享页面 ====================
    location /share/ {
        limit_req zone=cd_api burst=30 nodelay;
        proxy_pass http://clouddisk_backend/share/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==================== OnlyOffice ====================
    location /onlyoffice/ {
        proxy_pass http://127.0.0.1:8082/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ==================== MinIO CDN 代理 ====================
    location /minio-cdn/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_buffering off;
        client_max_body_size 20g;

        location ~* \.(jpg|jpeg|png|gif|webp|mp4|webm)$ {
            proxy_pass http://127.0.0.1:9000;
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # ==================== Actuator（仅内网访问） ====================
    location /actuator/ {
        # 仅允许内网 IP 访问监控端点
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://clouddisk_backend/actuator/;
        proxy_set_header Host $host;
    }
}

