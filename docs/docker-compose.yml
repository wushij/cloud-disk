# CloudDisk Pro 全栈 Docker Compose 部署
# 使用方式: docker compose -f docs/docker-compose.yml up -d
# 首次启动前导入数据库: docker exec -i clouddisk-mysql mysql -uroot -p${MYSQL_ROOT_PASSWORD} < sql/init.sql
#
# 可选 profile（按需追加）:
#   docker compose -f docs/docker-compose.yml --profile elk --profile xxl --profile sentinel --profile onlyoffice --profile monitoring --profile ldap up -d

version: '3.8'

x-common-env: &common-env
  TZ: Asia/Shanghai

services:
  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.0
    container_name: clouddisk-mysql
    environment:
      <<: *common-env
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: CloudDisk
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=500
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: clouddisk-redis
    environment:
      <<: *common-env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: clouddisk-minio
    environment:
      <<: *common-env
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: clouddisk-rabbitmq
    environment:
      <<: *common-env
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    build:
      context: ./elasticsearch
    image: clouddisk/elasticsearch:8.12.2-ik-pinyin
    container_name: clouddisk-es
    environment:
      <<: *common-env
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # ==================== 应用服务 ====================

  backend:
    build:
      context: ..
      dockerfile: docs/Dockerfile.backend
    container_name: clouddisk-backend
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/CloudDisk?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      CLOUDDISK_REDIS_ENABLED: "true"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      CLOUDDISK_STORAGE_TYPE: minio
      CLOUDDISK_MINIO_ENDPOINT: http://minio:9000
      CLOUDDISK_MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      CLOUDDISK_MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      CLOUDDISK_RABBITMQ_ENABLED: "true"
      SPRING_RABBITMQ_HOST: rabbitmq
      CLOUDDISK_ELASTICSEARCH_ENABLED: "true"
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: clouddisk-nginx
    environment:
      <<: *common-env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../frontend/dist:/usr/share/nginx/html/pc:ro
      - ../mobile/dist/build/h5:/usr/share/nginx/html/mobile:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ==================== 可选服务（profile 激活） ====================

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: clouddisk-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    profiles:
      - elk

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.2
    container_name: clouddisk-logstash
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
    volumes:
      - ./logstash/pipeline.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    profiles:
      - elk

  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: clouddisk-skywalking-oap
    ports:
      - "11800:11800"
      - "12800:12800"
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch:9200
    depends_on:
      - elasticsearch
    profiles:
      - elk

  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: clouddisk-skywalking-ui
    ports:
      - "8188:8080"
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    depends_on:
      - skywalking-oap
    profiles:
      - elk

  spring-boot-admin:
    image: codecentric/spring-boot-admin:3.2.0
    container_name: clouddisk-admin
    ports:
      - "8090:8090"
    profiles:
      - monitoring

  openldap:
    image: osixia/openldap:1.5.0
    container_name: clouddisk-openldap
    environment:
      LDAP_ORGANISATION: CloudDisk
      LDAP_DOMAIN: clouddisk.local
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD:-admin}
    ports:
      - "389:389"
    profiles:
      - ldap

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: clouddisk-xxl-job-admin
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=root
    profiles:
      - xxl

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.6
    container_name: clouddisk-sentinel
    ports:
      - "8858:8858"
    profiles:
      - sentinel

  onlyoffice:
    image: onlyoffice/documentserver:8.0.1
    container_name: clouddisk-onlyoffice
    ports:
      - "8082:80"
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-clouddisk-onlyoffice-jwt-secret-change-me}
    profiles:
      - onlyoffice

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  es_data:
